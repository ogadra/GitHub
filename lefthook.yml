pre-commit:
  parallel: false
  piped: true
  commands:
    # コードのフォーマットを自動修正
    01_terraform_fmt:
      glob: "*.tf"
      stage_fixed: true
      run: terraform fmt {staged_files}
    # 設定ファイルの構文・整合性を検証
    02_terraform_validate:
      glob: "*.tf"
      run: terraform validate
    # tflint による静的解析
    03_tflint:
      glob: "*.tf"
      run: tflint --minimum-failure-severity=notice
    # セキュリティスキャン
    04_checkov:
      run: checkov -d . --external-checks-dir ./custom_policies --quiet --compact
    # シークレットの漏洩を検知
    05_gitleaks:
      run: gitleaks protect --staged --verbose

pre-push:
  parallel: true
  commands:
    terraform-validate:
      run: terraform validate
    tflint:
      run: tflint --minimum-failure-severity=notice
    gitleaks:
      run: gitleaks detect --verbose
    checkov:
      run: checkov -d . --external-checks-dir ./custom_policies --quiet --compact
